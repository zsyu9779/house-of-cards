# House of Cards 配置文件
# version: 0.1.0

[house]
name = "default"
version = "0.1.0"

[speaker]
# Speaker 配置
runtime = "claude-code"
model = "opus"

[whip]
# Whip 配置
heartbeat_interval = "10s"
stuck_threshold = "5m"
max_retries = 2

[storage]
# 存储配置
db_path = ".hoc/state.db"

[defaults]
# 默认配置
topology = "parallel"
