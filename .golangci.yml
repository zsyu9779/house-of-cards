# golangci-lint configuration — v2 format
version: "2"

run:
  timeout: 3m

linters:
  enable:
    # --- v0.2 baseline ---
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    # --- v0.3 new ---
    - gosec          # security scanning
    - gocritic       # code quality
    - exhaustive     # switch enum completeness
    - gochecknoinits # forbid init() functions
    - godot          # comment style
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Printf
        - fmt.Println
        - Close
    gosec:
      excludes:
        # G104: unhandled errors — deferred to E-1 error governance.
        # Remove this exclusion after E-1 is complete.
        - G104
        # G204: subprocess with variable args — expected in CLI/runtime tools.
        - G204
        # G306: WriteFile with 0644 — standard for config/test files.
        - G306
        # G202: SQL string concatenation — IN clause placeholders are safe.
        - G202
        # G703: path traversal — filepath.Clean is applied before use.
        - G703
      severity: high
      confidence: medium
    gocritic:
      enabled-checks:
        - badLock
        - nilValReturn
    exhaustive:
      default-signifies-exhaustive: true
    godot:
      scope: declarations
      period: true
  exclusions:
    rules:
      # Test files can use init().
      - path: _test\.go
        linters:
          - gochecknoinits
      # Test files don't need exhaustive switch.
      - path: _test\.go
        linters:
          - exhaustive
      # QF1012: "Use fmt.Fprintf instead of WriteString(fmt.Sprintf)" — style preference.
      - linters:
          - staticcheck
        text: "QF1012"
